<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My English Pattern DB</title>
<style>
  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: #e8e8e4;
    --text: #1a1a1a;
    --text-muted: #888;
    --text-light: #bbb;
    --accent: #2d6ef0;
    --accent-soft: #eef2ff;

    --cat-emotion: #e8476a;
    --cat-emotion-soft: #fff0f3;
    --cat-daily: #1aaa6b;
    --cat-daily-soft: #f0faf5;
    --cat-parenting: #f59e0b;
    --cat-parenting-soft: #fffbeb;
    --cat-inner: #7c3aed;
    --cat-inner-soft: #f5f0ff;

    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-title { flex: 1; }
  .header-title h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .header-title p  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn-add:hover { opacity: 0.88; }

  /* ── Filter Bar ── */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .tab {
    padding: 11px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: -1px;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .count {
    display: inline-block;
    background: var(--border);
    color: var(--text-muted);
    border-radius: 20px;
    padding: 1px 6px;
    font-size: 10px;
    margin-left: 4px;
    font-weight: 600;
  }
  .tab.active .count { background: var(--accent-soft); color: var(--accent); }

  /* ── Search ── */
  .search-wrap { padding: 14px 16px 10px; }
  .search-wrap input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 14px;
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-light); }

  /* ── Cards ── */
  .cards {
    padding: 0 16px 80px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state h3 { font-size: 15px; margin-bottom: 6px; }
  .empty-state p  { font-size: 13px; line-height: 1.6; }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .cat-pill {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 3px;
  }
  .cat-emotion   { background: var(--cat-emotion-soft);   color: var(--cat-emotion); }
  .cat-daily     { background: var(--cat-daily-soft);     color: var(--cat-daily); }
  .cat-parenting { background: var(--cat-parenting-soft); color: var(--cat-parenting); }
  .cat-inner     { background: var(--cat-inner-soft);     color: var(--cat-inner); }

  .card-pattern {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
    flex: 1;
    line-height: 1.4;
  }

  .card-meaning {
    padding: 0 16px 12px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .card-divider { border: none; border-top: 1px solid var(--border); }

  .card-body {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .field { display: flex; flex-direction: column; gap: 3px; }

  .field-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-light);
  }

  .field-value          { font-size: 13px; line-height: 1.55; color: var(--text); }
  .field-value.en       { font-style: italic; color: #333; }
  .field-value.ko       { color: var(--text-muted); font-size: 12px; }
  .field-value.variation{ color: var(--accent); font-weight: 500; }
  .field-value.baby     { color: var(--cat-parenting); font-weight: 500; }

  .practice-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .practice-list li {
    font-size: 12px;
    color: var(--text-muted);
    padding-left: 12px;
    position: relative;
    line-height: 1.5;
  }
  .practice-list li::before { content: "–"; position: absolute; left: 0; color: var(--text-light); }

  .card-footer {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-icon:hover        { background: var(--bg); color: var(--text); }
  .btn-icon.danger:hover { background: #fff0f0; color: #e84040; border-color: #fcc; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }

  .modal-head {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-head h2 { font-size: 15px; font-weight: 700; flex: 1; }

  .btn-close {
    background: var(--bg);
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1;
  }

  .modal-body {
    overflow-y: auto;
    padding: 16px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .form-group { display: flex; flex-direction: column; gap: 5px; }

  .form-group label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }
  .form-group label span { font-weight: 400; color: var(--text-light); margin-left: 4px; }

  .form-group input,
  .form-group textarea,
  .form-group select {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    resize: vertical;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { min-height: 72px; }

  .form-hint { font-size: 10px; color: var(--text-light); margin-top: 2px; }

  .modal-foot {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .btn-cancel {
    flex: 1;
    padding: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
  }

  .btn-save {
    flex: 2;
    padding: 11px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.88; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #1a1a1a;
    color: #fff;
    padding: 9px 18px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.25s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Bulk button ── */
  .btn-bulk {
    background: none;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 8px 13px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-bulk:hover { background: var(--accent-soft); }

  /* ── Bulk preview ── */
  .bulk-summary {
    background: var(--accent-soft);
    border: 1px solid #c7d9ff;
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .bulk-preview-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .bulk-preview-item {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }

  .bulk-preview-item.warn {
    border-color: #fcd34d;
    background: #fffbeb;
  }

  .bulk-preview-head {
    padding: 9px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
  }

  .bulk-preview-head .num {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-light);
    min-width: 18px;
  }

  .bulk-preview-head .pattern-text {
    font-size: 13px;
    font-weight: 600;
    flex: 1;
    color: var(--text);
  }

  .bulk-preview-head .warn-badge {
    font-size: 10px;
    background: #fef3c7;
    color: #92400e;
    border-radius: 4px;
    padding: 2px 6px;
    font-weight: 600;
  }

  .bulk-preview-fields {
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .bulk-preview-row {
    display: flex;
    gap: 6px;
    font-size: 11px;
    line-height: 1.5;
  }

  .bulk-preview-row .lbl {
    color: var(--text-light);
    font-weight: 600;
    min-width: 60px;
    flex-shrink: 0;
  }

  .bulk-preview-row .val {
    color: var(--text-muted);
  }

  .bulk-preview-row .val.missing {
    color: #fbbf24;
    font-style: italic;
  }

  /* ── Desktop ── */
  @media (min-width: 640px) {
    .cards       { max-width: 640px; margin: 0 auto; padding-left: 24px; padding-right: 24px; }
    .filter-bar  { justify-content: center; }
    .search-wrap { max-width: 640px; margin: 0 auto; padding-left: 24px; padding-right: 24px; }
    header       { max-width: 640px; margin: 0 auto; border-bottom: none; }
    .modal       { border-radius: var(--radius); margin-bottom: 40px; }
    .modal-overlay { align-items: center; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>My English Pattern DB</h1>
    <p>Conversational American English</p>
  </div>
  <button class="btn-bulk" onclick="openBulkModal()">+ Bulk</button>
  <button class="btn-add" onclick="openModal()">+ Add Entry</button>
</header>

<div class="filter-bar" id="filterBar">
  <button class="tab active" data-cat="all">All <span class="count" id="cnt-all">0</span></button>
  <button class="tab" data-cat="emotion">Emotion <span class="count" id="cnt-emotion">0</span></button>
  <button class="tab" data-cat="daily">Daily Life <span class="count" id="cnt-daily">0</span></button>
  <button class="tab" data-cat="parenting">Parenting <span class="count" id="cnt-parenting">0</span></button>
  <button class="tab" data-cat="inner">Inner Thoughts <span class="count" id="cnt-inner">0</span></button>
</div>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="Search patterns, sentences, keywords..." oninput="renderCards()">
</div>

<div class="cards" id="cardsContainer"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <h2 id="modalTitle">New Entry</h2>
      <button class="btn-close" onclick="closeModal()">&#215;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Category</label>
        <select id="f-category">
          <option value="emotion">Emotion</option>
          <option value="daily">Daily Life</option>
          <option value="parenting">Parenting</option>
          <option value="inner">Inner Thoughts</option>
        </select>
      </div>
      <div class="form-group">
        <label>Pattern</label>
        <input type="text" id="f-pattern" placeholder='e.g., "I just knew I had to ~"'>
      </div>
      <div class="form-group">
        <label>Core Meaning <span>(Korean – feeling / usage)</span></label>
        <input type="text" id="f-meaning" placeholder="직감적으로 꼭 해야겠다고 느낄 때">
      </div>
      <div class="form-group">
        <label>Example Sentence</label>
        <input type="text" id="f-example" placeholder="I just knew I had to go see it.">
      </div>
      <div class="form-group">
        <label>Korean Translation <span>(natural, not literal)</span></label>
        <input type="text" id="f-translation" placeholder="나 그거 꼭 보러 가야겠다고 느꼈어">
      </div>
      <div class="form-group">
        <label>My Variation <span>(your real life)</span></label>
        <input type="text" id="f-variation" placeholder="I just knew I had to take a break.">
      </div>
      <div class="form-group">
        <label>Baby Version <span>(optional)</span></label>
        <input type="text" id="f-baby" placeholder="Let's go!">
        <div class="form-hint">A simple version you can say to your 1-year-old</div>
      </div>
      <div class="form-group">
        <label>Quick Practice <span>(3 lines, one per line)</span></label>
        <textarea id="f-practice" placeholder="I just knew I had to leave&#10;I just knew I had to say something&#10;I just knew I had to try"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEntry()">Save Entry</button>
    </div>
  </div>
</div>

<!-- Bulk Import Modal -->
<div class="modal-overlay" id="bulkOverlay" onclick="handleBulkOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <h2 id="bulkTitle">Bulk Import</h2>
      <button class="btn-close" onclick="closeBulkModal()">&#215;</button>
    </div>

    <!-- Step 1: Paste -->
    <div id="bulk-step1" class="modal-body">
      <div class="form-group">
        <label>Default Category <span>(used when not specified in text)</span></label>
        <select id="bulk-category">
          <option value="emotion">Emotion</option>
          <option value="daily">Daily Life</option>
          <option value="parenting">Parenting</option>
          <option value="inner">Inner Thoughts</option>
        </select>
      </div>
      <div class="form-group">
        <label>Paste Entries Below</label>
        <textarea id="bulk-textarea" style="min-height:220px;font-size:12px;line-height:1.6" placeholder="[Pattern]&#10;I just knew I had to ~&#10;&#10;[Core Meaning]&#10;직감적으로 꼭 해야겠다고 느낄 때&#10;&#10;[Example Sentence]&#10;I just knew I had to go see it.&#10;&#10;[Korean Translation]&#10;나 그거 꼭 보러 가야겠다고 느꼈어&#10;&#10;[My Variation]&#10;I just knew I had to take a break.&#10;&#10;[Baby Version]&#10;Let's go!&#10;&#10;[Quick Practice]&#10;- I just knew I had to leave&#10;- I just knew I had to say something&#10;- I just knew I had to try&#10;&#10;---&#10;&#10;[Pattern]&#10;Next entry here..."></textarea>
        <div class="form-hint">Separate multiple entries with --- on its own line. Baby Version is optional.</div>
      </div>
    </div>

    <!-- Step 2: Preview -->
    <div id="bulk-step2" class="modal-body" style="display:none">
      <div class="bulk-summary" id="bulk-summary"></div>
      <div class="bulk-preview-list" id="bulk-preview-list"></div>
    </div>

    <div class="modal-foot" id="bulk-foot1">
      <button class="btn-cancel" onclick="closeBulkModal()">Cancel</button>
      <button class="btn-save" onclick="previewBulk()">Preview Entries</button>
    </div>
    <div class="modal-foot" id="bulk-foot2" style="display:none">
      <button class="btn-cancel" onclick="backToBulkPaste()">Back</button>
      <button class="btn-save" onclick="saveBulkEntries()">Save All</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'engpatterns_v1';
let entries = [];
let currentFilter = 'all';
let editingId = null;

const CAT_LABELS = {
  emotion: 'Emotion',
  daily: 'Daily Life',
  parenting: 'Parenting',
  inner: 'Inner Thoughts'
};

const SEED = [{
  id: 'seed1',
  category: 'inner',
  pattern: 'I just knew I had to ~',
  meaning: '직감적으로 꼭 해야겠다고 느낄 때',
  example: 'I just knew I had to go see it.',
  translation: '나 그거 꼭 보러 가야겠다고 느꼈어',
  variation: 'I just knew I had to take a break.',
  baby: "Let's go!",
  practice: ['I just knew I had to leave', 'I just knew I had to say something', 'I just knew I had to try'],
  createdAt: Date.now()
}];

// Storage
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : [...SEED];
  } catch { entries = [...SEED]; }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

// Render
function renderCards() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const container = document.getElementById('cardsContainer');

  const filtered = entries.filter(e => {
    if (currentFilter !== 'all' && e.category !== currentFilter) return false;
    if (!query) return true;
    const blob = [e.pattern, e.meaning, e.example, e.translation, e.variation, e.baby, ...(e.practice || [])].join(' ').toLowerCase();
    return blob.includes(query);
  }).sort((a, b) => b.createdAt - a.createdAt);

  updateCounts();

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><h3>No entries yet</h3><p>Tap "+ Add Entry" to start building your database.</p></div>`;
    return;
  }

  container.innerHTML = filtered.map(cardHTML).join('');
}

function updateCounts() {
  document.getElementById('cnt-all').textContent = entries.length;
  ['emotion', 'daily', 'parenting', 'inner'].forEach(cat => {
    const el = document.getElementById(`cnt-${cat}`);
    if (el) el.textContent = entries.filter(e => e.category === cat).length;
  });
}

function cardHTML(e) {
  const id = e.id;
  const practiceHTML = (e.practice || []).length
    ? `<ul class="practice-list">${e.practice.map(p => `<li>${esc(p)}</li>`).join('')}</ul>`
    : `<span style="color:var(--text-light);font-size:12px;">—</span>`;

  const babyBlock = e.baby ? `
    <hr class="card-divider">
    <div class="card-body" style="padding-top:10px;padding-bottom:10px;">
      <div class="field">
        <div class="field-label">Baby Version</div>
        <div class="field-value baby">${esc(e.baby)}</div>
      </div>
    </div>` : '';

  return `
<div class="card" id="card-${id}">
  <div class="card-header">
    <span class="cat-pill cat-${e.category}">${CAT_LABELS[e.category]}</span>
    <div class="card-pattern">${esc(e.pattern)}</div>
  </div>
  <div class="card-meaning">${esc(e.meaning)}</div>
  <hr class="card-divider">
  <div class="card-body">
    <div class="field">
      <div class="field-label">Example Sentence</div>
      <div class="field-value en">${esc(e.example)}</div>
    </div>
    <div class="field">
      <div class="field-label">Korean Translation</div>
      <div class="field-value ko">${esc(e.translation)}</div>
    </div>
    <div class="field">
      <div class="field-label">My Variation</div>
      <div class="field-value variation">${esc(e.variation)}</div>
    </div>
  </div>
  ${babyBlock}
  <hr class="card-divider">
  <div class="card-body" style="padding-top:10px;padding-bottom:10px;">
    <div class="field">
      <div class="field-label">Quick Practice</div>
      ${practiceHTML}
    </div>
  </div>
  <div class="card-footer">
    <button class="btn-icon" onclick="copyCard('${id}')">Copy</button>
    <button class="btn-icon" onclick="editEntry('${id}')">Edit</button>
    <button class="btn-icon danger" onclick="deleteEntry('${id}')">Delete</button>
  </div>
</div>`;
}

function esc(str) {
  return str ? str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}

// CRUD
function saveEntry() {
  const get = id => document.getElementById(id).value.trim();
  const pattern     = get('f-pattern');
  const example     = get('f-example');
  const meaning     = get('f-meaning');
  const translation = get('f-translation');
  const variation   = get('f-variation');
  const baby        = get('f-baby');
  const category    = get('f-category');
  const practice    = get('f-practice').split('\n').map(s => s.trim()).filter(Boolean);

  if (!pattern || !example) { showToast('Pattern and Example Sentence are required.'); return; }

  if (editingId) {
    const idx = entries.findIndex(e => e.id === editingId);
    if (idx !== -1) entries[idx] = { ...entries[idx], category, pattern, meaning, example, translation, variation, baby, practice };
    showToast('Entry updated.');
  } else {
    entries.unshift({ id: 'e' + Date.now(), category, pattern, meaning, example, translation, variation, baby, practice, createdAt: Date.now() });
    showToast('Entry saved.');
  }

  save();
  closeModal();
  renderCards();
}

function editEntry(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Entry';
  document.getElementById('f-category').value    = e.category;
  document.getElementById('f-pattern').value     = e.pattern;
  document.getElementById('f-meaning').value     = e.meaning;
  document.getElementById('f-example').value     = e.example;
  document.getElementById('f-translation').value = e.translation;
  document.getElementById('f-variation').value   = e.variation;
  document.getElementById('f-baby').value        = e.baby || '';
  document.getElementById('f-practice').value    = (e.practice || []).join('\n');
  openModal();
}

function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  entries = entries.filter(e => e.id !== id);
  save();
  renderCards();
  showToast('Deleted.');
}

function copyCard(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  const lines = [
    `[Pattern]\n${e.pattern}`,
    `[Core Meaning]\n${e.meaning}`,
    `[Example Sentence]\n${e.example}`,
    `[Korean Translation]\n${e.translation}`,
    `[My Variation]\n${e.variation}`,
    e.baby ? `[Baby Version]\n${e.baby}` : null,
    `[Quick Practice]\n${(e.practice || []).map(p => '- ' + p).join('\n')}`
  ].filter(Boolean).join('\n\n');
  navigator.clipboard.writeText(lines)
    .then(() => showToast('Copied to clipboard.'))
    .catch(() => showToast('Copy failed — try a different browser.'));
}

// Modal
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('f-pattern').focus(), 260);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  editingId = null;
  document.getElementById('modalTitle').textContent = 'New Entry';
  ['f-pattern','f-meaning','f-example','f-translation','f-variation','f-baby','f-practice'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-category').value = 'emotion';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// Tabs
document.getElementById('filterBar').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.cat;
  renderCards();
});

// Toast
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Bulk Import ────────────────────────────────────────────
let bulkParsed = [];

function openBulkModal() {
  document.getElementById('bulkOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  // reset to step 1
  showBulkStep(1);
  setTimeout(() => document.getElementById('bulk-textarea').focus(), 260);
}

function closeBulkModal() {
  document.getElementById('bulkOverlay').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('bulk-textarea').value = '';
  bulkParsed = [];
  showBulkStep(1);
}

function handleBulkOverlayClick(e) {
  if (e.target === document.getElementById('bulkOverlay')) closeBulkModal();
}

function showBulkStep(n) {
  document.getElementById('bulk-step1').style.display = n === 1 ? '' : 'none';
  document.getElementById('bulk-step2').style.display = n === 2 ? '' : 'none';
  document.getElementById('bulk-foot1').style.display = n === 1 ? '' : 'none';
  document.getElementById('bulk-foot2').style.display = n === 2 ? '' : 'none';
  document.getElementById('bulkTitle').textContent = n === 1 ? 'Bulk Import' : 'Preview Entries';
}

function backToBulkPaste() {
  showBulkStep(1);
}

// Parse a single entry block into a data object
function parseChunk(text, defaultCategory) {
  const fields = {};
  // Extract each [Field] section and its content
  const regex = /\[([^\]]+)\]\s*\n?([\s\S]*?)(?=\n\s*\[[^\]]+\]|$)/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    const key = match[1].trim();
    const val = match[2].trim();
    if (key && val) fields[key] = val;
  }

  const practice = (fields['Quick Practice'] || '')
    .split('\n')
    .map(l => l.replace(/^[\-–•]\s*/, '').trim())
    .filter(Boolean);

  // Detect category keyword in text
  const catMap = { 'emotion': 'emotion', 'daily': 'daily', 'daily life': 'daily', 'parenting': 'parenting', 'inner': 'inner', 'inner thoughts': 'inner' };
  const catRaw = (fields['Category'] || '').toLowerCase().trim();
  const category = catMap[catRaw] || defaultCategory;

  return {
    pattern:     fields['Pattern'] || '',
    meaning:     fields['Core Meaning'] || '',
    example:     fields['Example Sentence'] || '',
    translation: fields['Korean Translation'] || '',
    variation:   fields['My Variation'] || '',
    baby:        fields['Baby Version'] || '',
    practice,
    category,
  };
}

function parseBulkText(raw, defaultCategory) {
  // Split on lines containing only dashes (---, ----, etc.)
  const chunks = raw.split(/\n[ \t]*-{3,}[ \t]*\n/);
  return chunks
    .map(c => c.trim())
    .filter(Boolean)
    .map(c => parseChunk(c, defaultCategory))
    .filter(e => e.pattern || e.example); // require at least one of these
}

function previewBulk() {
  const raw = document.getElementById('bulk-textarea').value;
  const defaultCategory = document.getElementById('bulk-category').value;

  if (!raw.trim()) { showToast('Nothing to parse — paste your entries first.'); return; }

  bulkParsed = parseBulkText(raw, defaultCategory);

  if (bulkParsed.length === 0) {
    showToast('No valid entries found. Check your format.');
    return;
  }

  // Build summary
  const warnCount = bulkParsed.filter(e => !e.pattern || !e.example).length;
  document.getElementById('bulk-summary').innerHTML =
    `${bulkParsed.length} entr${bulkParsed.length === 1 ? 'y' : 'ies'} detected` +
    (warnCount ? ` &nbsp;·&nbsp; <span style="color:#b45309">${warnCount} incomplete</span>` : ' &nbsp;·&nbsp; All look good');

  // Build preview list
  const listEl = document.getElementById('bulk-preview-list');
  listEl.innerHTML = bulkParsed.map((e, i) => {
    const isWarn = !e.pattern || !e.example;
    const rows = [
      { lbl: 'Pattern',    val: e.pattern,     required: true },
      { lbl: 'Meaning',    val: e.meaning,     required: false },
      { lbl: 'Example',    val: e.example,     required: true },
      { lbl: 'Korean',     val: e.translation, required: false },
      { lbl: 'Variation',  val: e.variation,   required: false },
      { lbl: 'Baby',       val: e.baby,        required: false },
      { lbl: 'Practice',   val: e.practice.length ? e.practice.join(' / ') : '', required: false },
    ];
    const rowsHTML = rows.map(r => {
      const missing = r.required && !r.val;
      return `<div class="bulk-preview-row">
        <span class="lbl">${r.lbl}</span>
        <span class="val${missing ? ' missing' : ''}">${missing ? 'MISSING' : esc(r.val || '—')}</span>
      </div>`;
    }).join('');

    return `<div class="bulk-preview-item${isWarn ? ' warn' : ''}">
      <div class="bulk-preview-head">
        <span class="num">#${i + 1}</span>
        <span class="pattern-text">${esc(e.pattern || '(no pattern)')}</span>
        <span class="cat-pill cat-${e.category}" style="font-size:9px;padding:2px 7px">${CAT_LABELS[e.category]}</span>
        ${isWarn ? '<span class="warn-badge">Incomplete</span>' : ''}
      </div>
      <div class="bulk-preview-fields">${rowsHTML}</div>
    </div>`;
  }).join('');

  showBulkStep(2);
}

function saveBulkEntries() {
  if (!bulkParsed.length) return;
  const now = Date.now();
  bulkParsed.forEach((e, i) => {
    entries.unshift({
      id: 'b' + (now + i),
      category: e.category,
      pattern: e.pattern,
      meaning: e.meaning,
      example: e.example,
      translation: e.translation,
      variation: e.variation,
      baby: e.baby,
      practice: e.practice,
      createdAt: now + i,
    });
  });
  save();
  closeBulkModal();
  renderCards();
  showToast(`${bulkParsed.length} entr${bulkParsed.length === 1 ? 'y' : 'ies'} saved.`);
}

// Init
load();
renderCards();
</script>
